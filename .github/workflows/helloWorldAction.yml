name: Hello World Workflow

# Controls when the automation will run
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually run this workflow from the Actions tab

# A workflow run is made up of one or more jobs
jobs:
  say-hello:
    # The type of virtual machine runner the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed
    steps:
      # Step 1: Print the classic message to the console log
      - name: Run Hello World
        run: echo "Hello, World!"


  print-my-friends-name:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your repository code onto the runner machine
      - name: Check out repository code
        uses: actions/checkout@v4

      # Step 2: Install and configure the Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Specify your preferred version

      # Step 3: Install dependencies if your script requires them
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Step 4: Execute the script using its relative path
      - name: Run hello.py script
        run: python scripts/hello.py
